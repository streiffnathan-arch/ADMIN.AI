const FIELDS=[
{id:“website”, label:“🌐 Site web”,   kw:[“site”,“web”,“url”,“internet”,“homepage”]},
{id:“phone”,   label:“📞 Téléphone”,  kw:[“tel”,“phone”,“téléphone”,“mobile”,“portable”,“gsm”,“fax”]},

{id:“address”, label:“📍 Adresse”,    kw:[“adresse”,“address”,“rue”,“street”,“chemin”,“avenue”,“bd”,“boulevard”,“route”]},
];
const FICONS={pdf:“📄”,xlsx:“📊”,xls:“📊”,csv:“📊”,docx:“📝”,doc:“📝”,png:“🖼”,jpg:“🖼”,jpeg:“🖼”,txt:“📃”};
const ext=n=>n.split(”.”).pop().toLowerCase();
const ficon=n=>FICONS[ext(n)]||“📎”;
const ftime=d=>d.toLocaleTimeString(“fr-CH”,{hour:“2-digit”,minute:“2-digit”});

// ─── WAKE LOCK + SILENT AUDIO ──────────────────────────────────
let _wl=null, _actx=null, _asrc=null;
async function wakeLockOn(){
// 1. API
try{if(“wakeLock” in navigator) _wl=await navigator.wakeLock.request(“screen”);}catch{}
// 2. Silent audio loop (works even when API is unavailable)
try{
_actx=new(window.AudioContext||window.webkitAudioContext)();
const buf=_actx.createBuffer(1,_actx.sampleRate*3,_actx.sampleRate);
const ch=buf.getChannelData(0);
for(let i=0;i<ch.length;i++) ch[i]=(Math.random()*2-1)*0.0005;
_asrc=_actx.createBufferSource();
_asrc.buffer=buf; _asrc.loop=true;
_asrc.connect(_actx.destination);
_asrc.start(0);
}catch{}
}
function wakeLockOff(){
try{_wl?.release();_wl=null;}catch{}
try{_asrc?.stop();_asrc=null;}catch{}
try{_actx?.close();_actx=null;}catch{}
}

// ─── CHIME ────────────────────────────────────────────────────
function chime(){
try{
const c=new(window.AudioContext||window.webkitAudioContext)();
[523,659,784,1047].forEach((f,i)=>{
const o=c.createOscillator(),g=c.createGain();
o.connect(g);g.connect(c.destination);o.type=“sine”;o.frequency.value=f;
const t=c.currentTime+i*0.16;
g.gain.setValueAtTime(0,t);
g.gain.linearRampToValueAtTime(0.28,t+0.02);
g.gain.exponentialRampToValueAtTime(0.001,t+0.5);
o.start(t);o.stop(t+0.5);
});
}catch{}
}

// ─── EXCEL ────────────────────────────────────────────────────
function readWb(file){
return new Promise((res,rej)=>{
const r=new FileReader();
r.onload=e=>{try{res(XLSX.read(e.target.result,{type:“array”,cellDates:true}));}catch(err){rej(err);}};
r.onerror=rej; r.readAsArrayBuffer(file);
});
}
function wbToRows(wb,sn){
const ws=wb.Sheets[sn];
if(!ws) return{hdrs:[],rows:[]};
const all=XLSX.utils.sheet_to_json(ws,{header:1,defval:””,raw:false});
let hi=0;
for(let i=0;i<Math.min(all.length,10);i++){if(all[i].filter(c=>String(c).trim()).length>=2){hi=i;break;}}
const hdrs=all[hi].map((h,i)=>({i,lbl:String(h).trim()||`Col${i+1}`,raw:String(h).trim()}));
const rows=all.slice(hi+1).filter(r=>r.some(c=>String(c).trim())).map((r,ri)=>{
const o={_row:hi+1+ri+1};
hdrs.forEach((h,i)=>{o[h.lbl]=r[i]!==undefined?String(r[i]).trim():””;});
return o;
});
return{hdrs,rows};
}
function autoName(hdrs){
for(const kw of[“nom”,“name”,“entreprise”,“company”,“client”,“raison”,“société”,“societe”]){
const m=hdrs.find(h=>h.raw.toLowerCase().includes(kw));if(m)return m.lbl;
}
return hdrs[0]?.lbl||”**”;
}
function autoCol(hdrs,kws){
for(const kw of kws){const m=hdrs.find(h=>h.raw.toLowerCase().includes(kw));if(m)return m.lbl;}
return”**”;
}

// ─── FILE EXTRACT ─────────────────────────────────────────────
async function readFile(file){
const e=ext(file.name);
if(e===“pdf”) return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res({type:“pdf”,b64:r.result.split(”,”)[1],name:file.name});r.onerror=rej;r.readAsDataURL(file);});
if([“png”,“jpg”,“jpeg”,“webp”].includes(e)) return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res({type:“img”,b64:r.result.split(”,”)[1],mime:file.type,name:file.name});r.onerror=rej;r.readAsDataURL(file);});
if([“xlsx”,“xls”,“csv”].includes(e)) return new Promise((res,rej)=>{const r=new FileReader();r.onload=ev=>{try{const wb=XLSX.read(ev.target.result,{type:“array”});let t=””;wb.SheetNames.forEach(s=>{t+=`=== ${s} ===\n${XLSX.utils.sheet_to_csv(wb.Sheets[s])}\n\n`;});res({type:“txt”,text:t.trim(),name:file.name});}catch(err){rej(err);}};r.onerror=rej;r.readAsArrayBuffer(file);});
if([“docx”,“doc”].includes(e)) return new Promise((res,rej)=>{const r=new FileReader();r.onload=async ev=>{try{const x=await mammoth.extractRawText({arrayBuffer:ev.target.result});res({type:“txt”,text:x.value,name:file.name});}catch(err){rej(err);}};r.onerror=rej;r.readAsArrayBuffer(file);});
return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res({type:“txt”,text:r.result,name:file.name});r.onerror=rej;r.readAsText(file);});
}
function buildParts(text,files){
const p=[];
files.forEach(f=>{
if(f.type===“pdf”){p.push({type:“document”,source:{type:“base64”,media_type:“application/pdf”,data:f.b64}});p.push({type:“text”,text:`[PDF: ${f.name}]`});}
else if(f.type===“img”){p.push({type:“image”,source:{type:“base64”,media_type:f.mime,data:f.b64}});p.push({type:“text”,text:`[Image: ${f.name}]`});}
else if(f.type===“txt”){p.push({type:“text”,text:`[${f.name}]\n\```\n${f.text}\n````});}
});
if(text.trim()) p.push({type:“text”,text});
return p;
}

// ─── GEO DETECTION ────────────────────────────────────────────
function detectGeo(ctx,row){
const gkw=[“ville”,“city”,“pays”,“country”,“canton”,“npa”,“zip”,“code postal”,“localité”,“localite”,“adresse”,“address”,“siège”,“siege”,“hq”,“headquarter”,“location”,“région”,“region”];
const vals=[];
Object.entries({…ctx,…row}).forEach(([k,v])=>{
if(!v||k===”_row”) return;
if(gkw.some(g=>k.toLowerCase().includes(g))) vals.push(String(v).trim());
});
const u=[…new Set(vals)].filter(v=>v.length>1);
return u.length?u.join(”, “):null;
}

// ─── CLAUDE API ───────────────────────────────────────────────
async function callClaude(messages,webSearch=true){
const body={model:“claude-sonnet-4-20250514”,max_tokens:1000,messages};
if(webSearch) body.tools=[{type:“web_search_20250305”,name:“web_search”}];

async function enrichOne(company,ctx,fields,row){
const lbls=fields.map(f=>FIELDS.find(x=>x.id===f)?.label.replace(/^[^ ]+ /,””)).join(”, “);
const ctxStr=Object.entries(ctx).filter(([,v])=>v).map(([k,v])=>`${k}: ${v}`).join(” | “);
const geo=detectGeo(ctx,row);
const geoBlock=geo?`\n⚠️ CONTRAINTE GÉO STRICTE: Cette entreprise est dans "${geo}". Retourne UNIQUEMENT les données de cette zone. Si tu trouves le même nom ailleurs, ignore et mets null.`:””;

const prompt=`Recherche sur internet pour cette entreprise. Entreprise: "${company}" ${ctxStr?`Données connues: ${ctxStr}`:””}${geoBlock}
Champs à trouver: ${lbls}

Réponds UNIQUEMENT avec un JSON valide, sans texte avant ou après, sans backticks.
{
${fields.map(f=>`  "${f}": "valeur ou null"`).join(”,\n”)}
}`;

const raw=await callClaude([{role:“user”,content:prompt}],true);
try{const s=raw.indexOf(”{”),e=raw.lastIndexOf(”}”);if(s>=0&&e>s)return{ok:true,data:JSON.parse(raw.slice(s,e+1)),geo};}catch{}
return{ok:false,data:null,geo};
}

              <td><span className={`badge ${ok===r.fn.length?"bok":ok>0?"bpart":"bno"}`}>{ok===r.fn.length?"Complet":ok>0?`${ok}/${r.fn.length}`:"—"}</span></td>
            </tr>;

        </table></div>
